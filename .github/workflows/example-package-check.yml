# This is an example workflow that uses the Package Age Guard GitHub Action
# Add this to your repository's .github/workflows/ directory

name: Package Age Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at midnight
    - cron: '0 0 * * *'

jobs:
  check-packages:
    runs-on: ubuntu-latest
    name: Check Package Ages
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check Package Ages
        uses: MeonValleyWeb/package-age-guard/.github/actions/check-packages@main
        id: package-check
        with:
          min-age: 14
          production-only: false
          strict: true
          suggest: true
      
      - name: Post results comment
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Package Age Guard** found ${process.env.VIOLATIONS} packages newer than 14 days.\n\nPlease review the security policy or update package versions.`
            })
        env:
          VIOLATIONS: ${{ steps.package-check.outputs.violations }}
